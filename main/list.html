<!DOCTYPE html>
<html>
    <head>
        <style>
  body { display: none; }
</style>

<script>
const token = localStorage.getItem("limeAuth");

if (!token) {
  window.top.location.href = "/";
} else {
  fetch("https://limesofsourcecode.netlify.app/.netlify/functions/verifyToken", {
    headers: { Authorization: "Bearer " + token }
  })
  .then(res => res.json())
  .then(data => {
    if (data.valid) {
      document.body.style.display = "block"; // show page ONLY if valid
    } else {
      window.top.location.href = "/";
    }
  })
  .catch(() => {
    window.top.location.href = "/";
  });
}
</script>
